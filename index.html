<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScoreMaster</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
        :root{--primary-yellow:#FFD700;--dark-yellow:#E6C200;--bg-dark:#0D0D0D;--bg-card:#1A1A1A;--bg-input:#2A2A2A;--text-white:#FFFFFF;--text-gray:#8A8A8A;--text-light-gray:#B0B0B0;--green:#00C853;--red:#FF3D3D;--blue:#4A90D9;--border-color:#333333;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
        html,body{font-family:'Inter','Montserrat',sans-serif;background:var(--bg-dark);color:var(--text-white);overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0}
        
        #splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:10000;transition:opacity .6s,visibility .6s}
        #splash-screen.hidden{opacity:0;visibility:hidden}
        .splash-loader span{width:8px;height:8px;background:var(--primary-yellow);border-radius:50%;display:inline-block;margin:0 4px;animation:loaderBounce 1.4s ease infinite}
        @keyframes loaderBounce{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

        #login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,var(--primary-yellow) 0%,var(--primary-yellow) 42%,var(--bg-dark) 42%);z-index:9000;display:none;flex-direction:column;transition:opacity .4s}
        #login-screen.active{display:flex}
        .login-header{padding:calc(30px + var(--safe-top)) 0 20px;text-align:center}
        .login-logo-img{width:130px;filter:drop-shadow(0 4px 15px rgba(0,0,0,.25))}
        .login-form-container{flex:1;background:var(--bg-dark);border-radius:30px 30px 0 0;padding:35px 25px}
        .login-form-title{font-size:13px;color:var(--text-gray);margin-bottom:8px}
        .login-input{width:100%;padding:14px 16px;background:var(--bg-input);border:1px solid var(--border-color);border-radius:12px;color:#fff;margin-bottom:20px;outline:none}
        .login-btn{width:100%;padding:15px;background:var(--primary-yellow);color:#000;border:none;border-radius:12px;font-weight:700;cursor:pointer}
        
        #app{display:none;height:100%;width:100%;flex-direction:column}
        #app.active{display:flex}
        .pages-container{flex:1;overflow:hidden;position:relative}
        .page{position:absolute;top:0;left:0;width:100%;height:100%;overflow-y:auto;opacity:0;visibility:hidden;padding:var(--safe-top) 20px 80px}
        .page.active{opacity:1;visibility:visible}
        
        .bottom-nav{height:calc(65px + var(--safe-bottom));background:#111;border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding-top:8px}
        .nav-item{text-align:center;color:var(--text-gray);font-size:10px;cursor:pointer}
        .nav-item.active{color:var(--primary-yellow)}
        .nav-item.vip.active{color:var(--red)}

        .combined-card{background:#1E1E2E;border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid #2A2A3A}
        .status-badge{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
        .status-badge.en-cours{background:rgba(0,200,83,.15);color:var(--green)}
        .blurred-value{filter:blur(6px)}
        
        .toast{position:fixed;top:40px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#000;padding:12px 24px;border-radius:10px;transition:0.4s;z-index:10001}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast.error{background:var(--red);color:#fff}

        #admin-page{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg-dark);z-index:9500;padding:40px 20px;overflow-y:auto}
        #admin-page.active{display:block}
    </style>
</head>
<body>

<div id="splash-screen"><div class="splash-content"><div class="splash-loader"><span></span><span></span><span></span></div></div></div>

<div id="login-screen">
    <div class="login-header"><img src="logo-light.png" class="login-logo-img" alt="Logo"></div>
    <div class="login-form-container">
        <div class="login-form-title">Email</div>
        <input type="email" class="login-input" id="login-email" placeholder="Email">
        
        <div id="signup-fields" style="display:none;">
            <div class="login-form-title">Pseudo</div>
            <input type="text" class="login-input" id="login-username" placeholder="Pseudo">
        </div>

        <div class="login-form-title">Mot de passe</div>
        <div style="position: relative;">
            <input type="password" class="login-input" id="login-password" placeholder="••••••••">
            <i class="fas fa-eye" id="togglePassword" style="position:absolute;right:15px;top:15px;color:var(--text-gray);cursor:pointer"></i>
        </div>

        <button class="login-btn" id="btn-action" onclick="handleAuth()">Connexion</button>
        <p style="text-align:center;margin-top:20px;font-size:13px">
            <a href="#" id="toggle-auth" onclick="toggleAuthMode();return false;" style="color:var(--primary-yellow)">Créer un compte</a>
        </p>
    </div>
</div>

<div id="app">
    <div class="pages-container">
        <div class="page active" id="page-home">
            <h2 class="home-username">Bienvenue</h2>
            <div id="home-combined-container"></div>
        </div>
        <div class="page" id="page-packs"><h2>Nos Packs</h2></div>
        <div class="page" id="page-contact"><h2>Contact</h2></div>
        <div class="page" id="page-vip">
            <div class="vip-header">
                <h2 class="vip-username">Espace VIP+</h2>
                <button id="admin-btn" onclick="openAdmin()" style="display:none;padding:5px 10px;background:var(--red);color:#fff;border:none;border-radius:5px;margin-top:10px">Modifier</button>
            </div>
            <div id="vip-combined-container"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active" onclick="navigateTo('home')"><i class="fas fa-home"></i><br>Accueil</div>
        <div class="nav-item" onclick="navigateTo('packs')"><i class="fas fa-clone"></i><br>Packs</div>
        <div class="nav-item" onclick="navigateTo('contact')"><i class="fas fa-envelope"></i><br>Contact</div>
        <div class="nav-item vip" onclick="navigateTo('vip')"><i class="fas fa-user-shield"></i><br>VIP+</div>
    </div>
</div>

<div id="admin-page">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
        <h3>Panel Admin</h3>
        <button onclick="closeAdmin()">Fermer</button>
    </div>
    <input type="date" id="admin-date" class="login-input">
    <select id="admin-status" class="login-input">
        <option value="en-cours">En cours</option>
        <option value="termine">Terminé ✅</option>
        <option value="perdu">Perdu ❌</option>
    </select>
    <div id="admin-matches"></div>
    <button onclick="addMatchEntry()">+ Ajouter Match</button>
    <input type="number" id="admin-mise" class="login-input" placeholder="Mise (€)" style="margin-top:20px">
    <button class="login-btn" onclick="publishCombined()">PUBLIER LE COMBINÉ</button>
</div>

<div class="toast" id="toast"><span id="toast-message"></span></div>

<script>
    const SUPABASE_URL = 'https://pytqquerlktxnfnohwmg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5dHFxdWVybGt0eG5mbm9od21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTkxNzgsImV4cCI6MjA5MDczNTE3OH0.aBEIXwv-uSMLuuokUDJPEIgcAFMOrb6hi2LhZ56Pdng';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isSignUpMode = false;
    let currentCombined = null;

    // --- INITIALISATION ---
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.add('active');
        }, 2000);
    });

    // --- AUTHENTIFICATION ---
    function toggleAuthMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('signup-fields').style.display = isSignUpMode ? 'block' : 'none';
        document.getElementById('btn-action').textContent = isSignUpMode ? 'S\'inscrire' : 'Connexion';
        document.getElementById('toggle-auth').textContent = isSignUpMode ? 'Déjà un compte ? Connexion' : 'Créer un compte';
    }

    document.getElementById('togglePassword').addEventListener('click', function() {
        const input = document.getElementById('login-password');
        const type = input.type === 'password' ? 'text' : 'password';
        input.type = type;
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    async function handleAuth() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const username = document.getElementById('login-username').value;

        try {
            let user;
            if (isSignUpMode) {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) throw error;
                await supabaseClient.from('profiles').insert([{ id: data.user.id, email, username, is_vip: false, is_admin: false }]);
                showToast("Compte créé ! Connectez-vous.");
                toggleAuthMode();
                return;
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                user = data.user;
            }

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            window.isUserVip = profile.is_vip;
            window.isAdmin = profile.is_admin;

            // UI Updates
            document.querySelector('.home-username').textContent = "Salut, " + (profile.username || "Utilisateur");
            if(window.isAdmin) document.getElementById('admin-btn').style.display = 'block';

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('app').classList.add('active');
            chargerDonnees();

        } catch (err) {
            showToast(err.message, true);
        }
    }

    // --- NAVIGATION ---
    function navigateTo(page) {
        if(page === 'vip' && !window.isUserVip) {
            showToast("Accès réservé aux membres VIP+", true);
            return;
        }
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    // --- DATA ---
    async function chargerDonnees() {
        const { data: pub } = await supabaseClient.from('combineds_public').select('*').order('id', {ascending:false}).limit(1).single();
        if(!pub) return;
        
        currentCombined = pub;
        if(window.isUserVip) {
            const { data: vip } = await supabaseClient.from('combineds_vip').select('*').eq('id', pub.id).single();
            if(vip) currentCombined = {...pub, ...vip};
        }
        render();
    }

    function render() {
        const container = document.getElementById('home-combined-container');
        const vipContainer = document.getElementById('vip-combined-container');
        const html = `<div class="combined-card">
            <span class="status-badge en-cours">${currentCombined.status}</span>
            <p style="margin-top:10px">Combiné du ${currentCombined.date}</p>
            <div style="margin-top:10px">
                ${(currentCombined.matches || []).map(m => `<p>Match: ${m.teams} <br> Score: <span class="${!window.isUserVip ? 'blurred-value' : ''}">${m.score}</span></p>`).join('')}
            </div>
        </div>`;
        container.innerHTML = html;
        if(window.isUserVip) vipContainer.innerHTML = html;
    }

    // --- ADMIN ---
    let matches = [];
    function addMatchEntry() {
        const id = Date.now();
        const div = document.createElement('div');
        div.innerHTML = `<input type="text" placeholder="Equipe A - B" id="t-${id}"> <input type="text" placeholder="Score" id="s-${id}">`;
        document.getElementById('admin-matches').appendChild(div);
        matches.push(id);
    }

    async function publishCombined() {
        const date = document.getElementById('admin-date').value;
        const status = document.getElementById('admin-status').value;
        const mise = document.getElementById('admin-mise').value;
        const matchesData = matches.map(id => ({ teams: document.getElementById('t-'+id).value, score: document.getElementById('s-'+id).value }));

        const { data: pub } = await supabaseClient.from('combineds_public').insert([{ date, status, nombre_matchs: matchesData.length }]).select().single();
        await supabaseClient.from('combineds_vip').insert([{ id: pub.id, matches: matchesData, mise, total_odds: 10 }]);
        showToast("Publié !");
        closeAdmin();
        chargerDonnees();
    }

    function openAdmin() { document.getElementById('admin-page').classList.add('active'); }
    function closeAdmin() { document.getElementById('admin-page').classList.remove('active'); }
    function showToast(m, e) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.classList.toggle('error', e);
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
</script>
</body>
</html>
